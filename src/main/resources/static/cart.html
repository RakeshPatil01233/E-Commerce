<!DOCTYPE html>
<html>
	
<div class="navbar">
    <h2 class="logo">🛒 MyStore</h2>

    <div class="nav-links">
        <button onclick="goToProducts()">Products</button>
        <button onclick="goToCart()">Cart</button>
        <button onclick="goToOrders()">Orders</button>
        <button onclick="logout()" class="logout">Logout</button>
    </div>
</div>

<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #333;
            color: white;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn {
            background: red;
            color: white;
        }

        .order-btn {
            background: green;
            color: white;
            margin-top: 20px;
        }

        .back-btn {
            background: gray;
            color: white;
        }

        #total {
            margin-top: 20px;
        }
    </style>
</head>

<body onload="checkAuth(); loadCart()">

<div class="container">

    <h1>🛒 Your Cart</h1>

    <table id="cartTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3 id="total">Total: ₹ 0</h3>

    <button class="order-btn" onclick="placeOrder()">Place Order</button>
    <button class="back-btn" onclick="goToProducts()">Back to Products</button>

</div>

<script src="/js/app.js"></script>

</body>
</html>
